<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Закупки молочки — вход через Telegram</title>
    <style>
        /* === СТИЛИ === */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #fff9e6 0%, #fff2d9 100%); position: relative; min-height: 100vh; }
        .header { background: rgba(255, 248, 235, 0.98); border-bottom: 3px solid #d4a373; position: sticky; top: 0; z-index: 1000; }
        .header-top { max-width: 1400px; margin: 0 auto; padding: 15px 20px; display: flex; align-items: center; gap: 15px; }
        .logo span { font-size: 32px; }
        .logo h1 { color: #6b4f3c; font-size: 24px; }
        .search-box { flex: 1; }
        .search-box input { width: 100%; padding: 12px 20px; border: 2px solid #d4a373; border-radius: 30px; font-size: 16px; }
        .search-box input:focus { outline: none; border-color: #b87333; }
        .cart-icon { background: #d4a373; border: 2px solid #b87333; border-radius: 30px; padding: 10px 20px; color: white; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .cart-count { background: white; color: #b87333; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; }
        .nav-buttons { display: flex; gap: 10px; align-items: center; }
        .nav-btn { padding: 10px 20px; background: #fff2d9; border: 2px solid #d4a373; border-radius: 30px; color: #6b4f3c; cursor: pointer; font-size: 14px; }
        .nav-btn:hover { background: #d4a373; color: white; }
        .auth-btn { background: #6b4f3c; color: white; }
        .user-info { display: flex; align-items: center; gap: 10px; background: #fff2d9; border: 2px solid #d4a373; border-radius: 30px; padding: 5px 15px; cursor: pointer; }
        .user-info:hover { background: #d4a373; }
        .user-info:hover .user-name { color: white; }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: #d4a373; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .user-name { font-weight: bold; color: #6b4f3c; }
        .mobile-menu { display: none; }
        .desktop-container { max-width: 1400px; margin: 20px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
        .products-column { width: 100%; }
        .price-info { background: #fff2d9; border: 2px solid #d4a373; border-radius: 12px; padding: 12px; margin-bottom: 20px; color: #6b4f3c; }
        .category-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .category-tab { padding: 8px 16px; background: #fff2d9; border: 2px solid #d4a373; border-radius: 30px; color: #6b4f3c; cursor: pointer; }
        .category-tab.active { background: #d4a373; color: white; }
        .products-list { display: flex; flex-direction: column; gap: 10px; }
        .product-item { display: grid; grid-template-columns: 2fr 1fr 1fr 120px; align-items: center; padding: 12px; background: white; border: 2px solid #d4a373; border-radius: 12px; gap: 10px; font-size: 14px; }
        .product-item.in-cart { opacity: 0.7; background: #f9f9f9; }
        .product-name { font-weight: bold; color: #6b4f3c; }
        .product-note { font-size: 11px; color: #8b6b4f; }
        .product-price { color: #b87333; font-weight: bold; }
        .product-unit { color: #8b6b4f; }
        .product-controls { display: flex; align-items: center; gap: 5px; }
        .product-qty-btn { width: 30px; height: 30px; background: #d4a373; border: 2px solid #b87333; color: white; border-radius: 50%; cursor: pointer; }
        .product-qty-value { font-weight: bold; color: #6b4f3c; min-width: 30px; text-align: center; }
        .right-column { position: sticky; top: 90px; }
        .cart-desktop { background: #fff9e6; border: 3px solid #d4a373; border-radius: 20px; padding: 20px; }
        .cart-desktop h2 { color: #6b4f3c; border-bottom: 2px solid #d4a373; padding-bottom: 12px; }
        .cart-items { max-height: 300px; overflow-y: auto; margin-bottom: 15px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px dashed #d4a373; }
        .cart-item-name { font-weight: bold; color: #6b4f3c; }
        .cart-item-quantity { color: #b87333; font-weight: bold; }
        .cart-total { font-size: 18px; font-weight: bold; color: #6b4f3c; text-align: right; padding-top: 10px; border-top: 2px solid #d4a373; }
        .cart-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .btn { padding: 10px; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; flex: 1; }
        .btn-primary { background: #d4a373; color: white; border: 2px solid #b87333; }
        .btn-secondary { background: #fff2d9; color: #6b4f3c; border: 2px solid #d4a373; }
        .calculator-widget { background: #fff9e6; border: 3px solid #d4a373; border-radius: 20px; padding: 20px; margin-top: 20px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 3000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: #fff9e6; border: 3px solid #d4a373; border-radius: 25px; padding: 30px; max-width: 500px; width: 90%; position: relative; }
        .close-modal { position: absolute; top: 10px; right: 15px; font-size: 24px; color: #b87333; cursor: pointer; background: none; border: none; }
        .notification { position: fixed; top: 100px; right: 20px; background: #d4a373; color: white; padding: 15px 25px; border-radius: 50px; transform: translateX(400px); transition: transform 0.3s; z-index: 4000; }
        .notification.show { transform: translateX(0); }
        .profile-avatar-large { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 15px; overflow: hidden; }
        .profile-name { font-size: 20px; font-weight: bold; color: #6b4f3c; margin-bottom: 5px; }
        .profile-logout-btn { background: #c41e3a; color: white; border: none; border-radius: 30px; padding: 12px; width: 100%; margin-top: 20px; cursor: pointer; }
        .order-id { font-weight: bold; color: #000; border: 1px solid #000; padding: 3px 8px; border-radius: 15px; background: white; display: inline-block; }
        @media (max-width: 900px) {
            .desktop-container { display: none; }
            .mobile-view { display: block; padding: 10px; }
        }
    </style>
</head>
<body>
    <!-- Шапка -->
    <div class="header" id="header">
        <div class="header-top">
            <div class="logo"><span>🐄</span><h1>Закупки молочки</h1></div>
            <div class="search-box"><input type="text" id="searchInput" placeholder="🔍 Поиск товаров..." oninput="searchProducts()"></div>
            <div class="nav-buttons" id="navButtons"></div>
            <div class="cart-icon" onclick="toggleMobileCart()"><span>🛒</span><span class="cart-count" id="cartCount">0</span></div>
        </div>
    </div>

    <!-- Десктопная версия -->
    <div class="desktop-container">
        <div class="products-column">
            <div class="price-info">ℹ️ Цены ознакомительные. Доставка 30₽/кг включена.</div>
            <div class="category-tabs" id="categoryTabs"></div>
            <div class="products-list" id="productsList"></div>
        </div>
        <div class="right-column">
            <div class="cart-desktop">
                <h2>🛒 Моя корзина</h2>
                <div class="cart-items" id="desktopCartItems"></div>
                <div class="cart-total" id="desktopCartTotal">Предварительно: <span>0 ₽</span></div>
                <div class="cart-buttons">
                    <button class="btn btn-primary" onclick="showOrderForm()">Оформить</button>
                    <button class="btn btn-secondary" onclick="clearCart()">Очистить</button>
                </div>
            </div>
            <div class="calculator-widget">
                <h3>🧮 Калькулятор</h3>
                <div><input type="number" id="widgetPriceKg" placeholder="Цена за кг"></div>
                <div><input type="number" id="widgetGram" placeholder="Грамм"></div>
                <div class="calc-result" id="widgetResult">0 ₽</div>
            </div>
        </div>
    </div>

    <!-- Модальные окна -->
    <div class="modal" id="profileModal">
        <div class="modal-content">
            <button class="close-modal" onclick="hideProfileModal()">×</button>
            <div id="profileContent"></div>
        </div>
    </div>

    <div class="modal" id="authModal">
        <div class="modal-content">
            <button class="close-modal" onclick="hideAuthModal()">×</button>
            <h2>🔐 Вход через Telegram</h2>
            <div id="telegram-login-container"></div>
        </div>
    </div>

    <div class="modal" id="ordersModal">
        <div class="modal-content">
            <button class="close-modal" onclick="hideOrders()">×</button>
            <h2>📋 Мои заказы</h2>
            <div class="orders-container" id="ordersContainer"></div>
        </div>
    </div>

    <div class="modal" id="orderForm">
        <div class="modal-content">
            <button class="close-modal" onclick="hideOrderForm()">×</button>
            <h2>📝 Оформление заказа</h2>
            <form onsubmit="submitOrder(event)">
                <input type="text" id="packageName" placeholder="Подпись на пакете" required>
                <select id="pickupPoint" required>
                    <option value="">Выберите точку</option>
                    <option value="Автово">Автово</option>
                    <option value="Бухарестская">Бухарестская</option>
                </select>
                <input type="text" id="name" placeholder="Ваше имя" required>
                <input type="tel" id="phone" value="+7" required>
                <button type="submit">Отправить заказ</button>
            </form>
        </div>
    </div>

    <div class="modal" id="mobileCartModal">
        <div class="modal-content">
            <button class="close-modal" onclick="hideMobileCart()">×</button>
            <h2>🛒 Корзина</h2>
            <div class="cart-items" id="mobileCartItems"></div>
            <div class="cart-total" id="mobileCartTotal">0 ₽</div>
        </div>
    </div>

    <div class="notification" id="notification"></div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        // Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDztZkvuz3vp__7uUY9sv34R2G8d06qvZEA",
            authDomain: "moloko-15747.firebaseapp.com",
            projectId: "moloko-15747",
            storageBucket: "moloko-15747.firebasestorage.app",
            messagingSenderId: "533713083066",
            appId: "1:533713083066:web:5e520a9ce2c78d36314083"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Telegram
        const TELEGRAM_BOT_TOKEN = '8553841090:AAHJx6x0qLY6Ur53cFPtuOCKRUu_JUOWT-A';
        const TELEGRAM_CHAT_ID = '353422630';

        // ========== ЗАГРУЗКА ИЗ ТВОЕЙ ТАБЛИЦЫ ==========
        // 👇👇👇 ЭТО ТВОЯ ССЫЛКА (опубликованная версия)
        const GOOGLE_SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQx3L4M5N6O7P8Q9R0S1T2U3V4W5X6Y7Z8a9b0c1d2e3f4g5h6i7j8k9l0/pub?output=csv';

        let products = [];
        let cart = [];
        let currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
        let orders = [];

        // Загрузка товаров
        async function loadProducts() {
            try {
                const response = await fetch(GOOGLE_SHEET_CSV_URL);
                const csv = await response.text();
                const lines = csv.split('\n').filter(line => line.trim());
                const headers = lines[0].split(',').map(h => h.trim());
                
                products = [];
                for (let i = 1; i < lines.length; i++) {
                    const values = lines[i].split(',').map(v => v.trim());
                    if (values.length >= headers.length) {
                        let product = {};
                        headers.forEach((h, idx) => {
                            let val = values[idx] || '';
                            if (['id', 'price', 'step'].includes(h)) val = parseFloat(val) || 0;
                            product[h] = val;
                        });
                        if (product.id && product.name) products.push(product);
                    }
                }
                showNotification(`✅ Загружено ${products.length} товаров`);
                displayProducts();
            } catch (e) {
                console.error('Ошибка загрузки:', e);
                showNotification('⚠️ Ошибка загрузки товаров');
                products = [];
            }
        }

        // Остальные функции
        function displayProducts() {
            const list = document.getElementById('productsList');
            if (!list) return;
            
            let html = '';
            products.forEach(p => {
                html += `<div class="product-item">
                    <div class="product-name">${p.name}</div>
                    <div class="product-price">${p.price} ₽</div>
                    <div class="product-controls">
                        <button onclick="updateCart(${p.id}, -${p.step})">−</button>
                        <span id="qty-${p.id}">0</span>
                        <button onclick="updateCart(${p.id}, ${p.step})">+</button>
                    </div>
                </div>`;
            });
            list.innerHTML = html;
        }

        function updateCart(id, delta) {
            // Функция корзины
        }

        function showNotification(msg) {
            const n = document.getElementById('notification');
            n.textContent = msg;
            n.classList.add('show');
            setTimeout(() => n.classList.remove('show'), 3000);
        }

        // Запуск
        loadProducts();
    </script>
</body>
</html>
