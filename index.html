<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Закупки молочки — вход через ВКонтакте</title>
    <style>
        /* === ВАШИ СТИЛИ (оставляем как есть) === */

            background: #0077ff;

<body>
    <!-- Шапка -->
    <div class="header" id="header">
        <div class="header-top">
            <button class="menu-toggle" onclick="toggleMobileMenu()">☰</button>
            <div class="logo"><span>🐄</span><h1>Закупки молочки</h1></div>
            <div class="search-box"><input type="text" id="searchInput" placeholder="🔍 Поиск товаров..." oninput="searchProducts()"></div>

    </div>

    <!-- Мобильное меню (без изменений) -->
    <div class="mobile-menu-overlay" id="menuOverlay" onclick="toggleMobileMenu()"></div>

        <div class="mobile-menu-item" onclick="showModal('producer'); toggleMobileMenu()">📋 О производителе</div>
        <div class="mobile-menu-item" onclick="showModal('rules'); toggleMobileMenu()">📝 Правила заказа</div>
        <div class="mobile-menu-item" id="mobileOrdersItem" style="display: none;" onclick="showOrders(); toggleMobileMenu()">📋 Мои заказы</div>
        <div class="mobile-menu-item" id="mobileAuthMenuItem" onclick="handleMobileAuth(); toggleMobileMenu()">🔐 Войти</div>
        <div class="mobile-menu-item logout" id="mobileLogoutItem" style="display: none;" onclick="showLogoutConfirm()">🚪 Выйти</div>
    </div>

    <!-- Десктопная версия (без изменений) -->
    <div class="desktop-container">
        <!-- ... ваш код десктопной версии ... -->
    </div>

    <!-- Мобильная версия (без изменений) -->
    <div class="mobile-view">
        <!-- ... ваш код мобильной версии ... -->
    </div>

    <!-- Модальные окна (без изменений) -->
    <div class="modal" id="profileModal"><!-- ... --></div>
    <div class="modal" id="logoutConfirmModal"><!-- ... --></div>
    <div class="modal" id="producerModal"><!-- ... --></div>
    <div class="modal" id="rulesModal"><!-- ... --></div>

    <!-- ГЛАВНОЕ ИЗМЕНЕНИЕ: Модальное окно авторизации через ВКонтакте -->
    <div class="modal" id="authModal">
        <div class="modal-content auth-modal">
            <button class="close-modal" onclick="hideAuthModal()">×</button>
            <h2 style="color: #6b4f3c; margin-bottom: 20px;">🔐 Вход через ВКонтакте</h2>
            
            <div style="text-align: center; margin: 20px 0;">
                <p style="margin-bottom: 20px; color: #6b4f3c;">
                    Нажмите кнопку ниже, чтобы войти
                </p>
                
                <!-- КНОПКА ВХОДА ЧЕРЕЗ ВК -->
                <a href="https://oauth.vk.com/authorize?client_id=54487652&display=page&redirect_uri=https://rabotalya22.github.io/milk-shop-final/&scope=email&response_type=token&v=5.131" 
                   class="vk-login-btn" 
                   style="display: inline-block; text-decoration: none;">
                    Войти через ВКонтакте
                </a>
            </div>
            
            <p style="text-align: center; margin-top: 20px; font-size: 12px; color: #8b6b4f;">
                Мы получим только ваше имя и фото профиля

    <!-- Остальные модальные окна -->
    <div class="modal" id="ordersModal"><!-- ... --></div>
    <div class="modal" id="orderForm"><!-- ... --></div>
    <div class="modal" id="mobileCartModal"><!-- ... --></div>

    <!-- Уведомление -->
    <div class="notification" id="notification"></div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        // ================ ВАШИ ДАННЫЕ ================
        const firebaseConfig = {
            apiKey: "AIzaSyDztZkvuz3vp__7uUY9sv34R2G8d06qvZEA",
            authDomain: "moloko-15747.firebaseapp.com",
            projectId: "moloko-15747",
            storageBucket: "moloko-15747.firebasestorage.app",
            messagingSenderId: "533713083066",
            appId: "1:533713083066:web:5e520a9ce2c78d36314083",
            measurementId: "G-DDVM2WN2J9"
        };

        // ДАННЫЕ ВКОНТАКТЕ
        const VK_CONFIG = {
            appId: '54487652',
            groupId: '236729336',
            groupToken: 'vk1.a.kADYCfymLVoVesaQSTx8tBpgw3u9QgM6o9lC0Xz55ThPhKAeYC0Zr3pDsZK3f1SDK4wwjqEF3H-iv44xJUkvter9aJ93s-7RdGjXkMBsfJi_ZltSzRghHNJyiqqUiddV6eiXAPXd8y9PIlW0EALBMfJpaLSg0o-qTyCBGnR7r85Eqo_n2Q0EUhVFk74VtU5BcZpK8gsijyydecQ4Ik8d1w'
        };

        // Инициализация Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Google таблица
        const GOOGLE_SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRGMpTtKvFT6ZeWQI882xR0I1_8f12YWhsFWPzVnf7o3j6i8eE_MpCfA-ZBDYCIxXaufo3ZrdfnS7w4/pub?output=csv';

        // Запасные товары
        const fallbackProducts = [
            { id: 1, name: "🥥 Масло кокосовое нерафинированное", price: 3400, unit: "5 л", category: "maslo", orderUnit: "шт", orderNote: "флакон 5л", step: 1 },
            { id: 2, name: "🧈 Масло Премиум", price: 4600, unit: "5 кг", category: "maslo", orderUnit: "кор", orderNote: "коробка 5 кг", step: 1 },
            { id: 3, name: "🧈 Масло Сбойка", price: 1300, unit: "кг", category: "maslo", orderUnit: "уп", orderNote: "упаковка 2.2-2.9 кг", step: 1 }
        ];

        // Переменные
        let products = [];
        let cart = [];
        let currentCategory = 'all';
        let searchQuery = '';
        let currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
        let orders = [];

        // ========== ПРОВЕРЯЕМ URL ПРИ ЗАГРУЗКЕ ==========
        document.addEventListener('DOMContentLoaded', function() {
            // Проверяем, есть ли в URL токен от ВК
            if (window.location.hash) {
                const hashParams = new URLSearchParams(window.location.hash.substring(1));
                const accessToken = hashParams.get('access_token');
                const userId = hashParams.get('user_id');
                
                if (accessToken && userId) {
                    // Получаем данные пользователя
                    fetch(`https://api.vk.com/method/users.get?user_ids=${userId}&fields=photo_200&access_token=${accessToken}&v=5.131`)
                        .then(response => response.json())
                        .then(data => {
                            if (data.response && data.response[0]) {
                                const user = data.response[0];
                                
                                // Сохраняем пользователя
                                currentUser = {
                                    id: 'vk_' + user.id,
                                    name: user.first_name + ' ' + user.last_name,
                                    photo_url: user.photo_200,
                                    authDate: new Date().toISOString()
                                };
                                
                                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                                
                                // Очищаем URL от токена
                                window.location.hash = '';
                                
                                // Обновляем интерфейс
                                updateAuthUI();
                                hideAuthModal();
                                showNotification(`Добро пожаловать, ${user.first_name}! 🙏`);
                                
                                // Загружаем заказы
                                loadUserOrdersFromFirebase();
                            }
                        })
                        .catch(error => {
                            console.error('Ошибка получения данных:', error);
                            showNotification('Ошибка авторизации');
                        });
                }
            }
            
            // Загружаем остальные данные
            loadCart();
            loadProductsFromGoogleSheet();
            updateAllCarts();
            updateAuthUI();
            
            // Калькуляторы
            document.getElementById('widgetPriceKg').addEventListener('input', updateWidgetCalc);
            document.getElementById('widgetGram').addEventListener('input', updateWidgetCalc);
            document.getElementById('mobilePriceKg').addEventListener('input', updateMobileCalc);
            document.getElementById('mobileGram').addEventListener('input', updateMobileCalc);
            
            if (currentUser) {
                loadUserOrdersFromFirebase();
            }
        });

        // ========== ФУНКЦИИ ДЛЯ РАБОТЫ С ВК ==========
        function loginWithVK() {
            // Простой редирект на авторизацию ВК
            window.location.href = 'https://oauth.vk.com/authorize?client_id=54487652&display=page&redirect_uri=https://rabotalya22.github.io/milk-shop-final/&scope=email&response_type=token&v=5.131';
        }

        // Отправка заказа в группу ВК
        async function sendVKMessage(message) {
            try {
                const formData = new URLSearchParams();
                formData.append('access_token', VK_CONFIG.groupToken);
                formData.append('user_id', VK_CONFIG.groupId);
                formData.append('random_id', Math.floor(Math.random() * 1000000));
                formData.append('message', message);
                formData.append('v', '5.131');

                const response = await fetch('https://api.vk.com/method/messages.send', {
                    method: 'POST',
                    body: formData
                });
                
                return true;
            } catch (error) {
                console.error('Ошибка отправки в ВК:', error);
                return false;
            }
        }

        // ========== ВСЕ ВАШИ ФУНКЦИИ БЕЗ ИЗМЕНЕНИЙ ==========
        // Загрузка товаров
        async function loadProductsFromGoogleSheet() {
            try {
                const response = await fetch(GOOGLE_SHEET_CSV_URL);
                if (!response.ok) throw new Error('Ошибка загрузки');
                
                const csvText = await response.text();
                const rows = csvText.split('\n').filter(row => row.trim());
                
                if (rows.length < 2) throw new Error('Таблица пуста');
                
                const headers = rows[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
                
                const loadedProducts = [];
                for (let i = 1; i < rows.length; i++) {
                    const values = rows[i].match(/(".*?"|[^,]+)(?=\s*,|\s*$)/g) || [];
                    
                    if (values.length >= headers.length) {
                        const product = {};
                        headers.forEach((header, index) => {
                            let value = values[index] ? values[index].replace(/^"|"$/g, '').trim() : '';
                            
                            if (['id', 'price', 'step'].includes(header)) {
                                value = parseFloat(value) || 0;
                            }
                            product[header] = value;
                        });
                        
                        if (product.id && product.name) {
                            loadedProducts.push(product);
                        }
                    }
                }
                
                if (loadedProducts.length > 0) {
                    products = loadedProducts;
                    displayProducts();
                    return true;
                } else {
                    throw new Error('Нет товаров в таблице');
                }
                
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                products = fallbackProducts;
                displayProducts();
                return false;
            }
        }

        // Форматирование количества
        function formatQuantity(value) {
            const rounded = Math.round(value * 100) / 100;
            return Number.isInteger(rounded) ? rounded.toString() : rounded.toFixed(2);
        }

        // Скролл шапки
        window.addEventListener('scroll', function() {
            document.getElementById('header').classList.toggle('compact', window.scrollY > 50);
        });

        // Загрузка заказов из Firebase
        async function loadUserOrdersFromFirebase() {
            if (!currentUser) return;
            
            try {
                const snapshot = await db.collection('orders')
                    .where('userId', '==', currentUser.id)
                    .orderBy('date', 'desc')
                    .get();
                
                orders = [];
                snapshot.forEach(doc => {
                    orders.push({ id: doc.id, ...doc.data() });
                });
            } catch (error) {
                console.error('Ошибка загрузки заказов:', error);
            }
        }

        // Сохранение заказа в Firebase
        async function saveOrderToFirebase(order) {
            if (!currentUser) return false;
            
            try {
                const docRef = await db.collection('orders').add({
                    ...order,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                order.firebaseId = docRef.id;
                orders.unshift(order);
                return true;
            } catch (error) {
                console.error('Ошибка сохранения заказа:', error);
                return false;
            }
        }

        // Удаление заказа из Firebase
        async function deleteOrderFromFirebase(orderId, firebaseId) {
            try {
                await db.collection('orders').doc(firebaseId).delete();
                orders = orders.filter(o => o.id != orderId);
                return true;
            } catch (error) {
                console.error('Ошибка удаления заказа:', error);
                return false;
            }
        }

        // Обновление UI авторизации
        function updateAuthUI() {
            const navButtons = document.getElementById('navButtons');
            const mobileAuthItem = document.getElementById('mobileAuthMenuItem');
            const mobileLogoutItem = document.getElementById('mobileLogoutItem');
            const mobileOrdersItem = document.getElementById('mobileOrdersItem');
            
            if (currentUser) {
                const avatarHtml = currentUser.photo_url 
                    ? `<img src="${currentUser.photo_url}" alt="avatar">` 
                    : (currentUser.name ? currentUser.name.charAt(0).toUpperCase() : 'U');
                
                navButtons.innerHTML = `
                    <div class="user-info" onclick="showProfile()">
                        <div class="user-avatar">${avatarHtml}</div>
                        <span class="user-name">${currentUser.name || 'Пользователь'}</span>
                    </div>
                    <button class="nav-btn" onclick="showOrders()">📋 Мои заказы</button>
                    <button class="nav-btn" onclick="showModal('producer')">О производителе</button>
                    <button class="nav-btn" onclick="showModal('rules')">Правила</button>
                `;
                
                mobileAuthItem.innerHTML = `👤 ${currentUser.name || 'Профиль'}`;
                mobileAuthItem.onclick = () => { showProfile(); toggleMobileMenu(); };
                
                if (mobileOrdersItem) mobileOrdersItem.style.display = 'block';
                if (mobileLogoutItem) mobileLogoutItem.style.display = 'block';
                
            } else {
                navButtons.innerHTML = `
                    <button class="nav-btn auth-btn" onclick="showAuthModal()">🔐 Войти</button>
                    <button class="nav-btn" onclick="showModal('producer')">О производителе</button>
                    <button class="nav-btn" onclick="showModal('rules')">Правила</button>
                `;
                
                mobileAuthItem.innerHTML = '🔐 Войти';
                mobileAuthItem.onclick = () => { showAuthModal(); toggleMobileMenu(); };
                
                if (mobileOrdersItem) mobileOrdersItem.style.display = 'none';
                if (mobileLogoutItem) mobileLogoutItem.style.display = 'none';
            }
        }

        // Показать профиль
        function showProfile() {
            if (!currentUser) {
                showAuthModal();
                return;
            }
            
            const profileContent = document.getElementById('profileContent');
            
            const avatarHtml = currentUser.photo_url 
                ? `<img src="${currentUser.photo_url}" alt="avatar">` 
                : (currentUser.name ? currentUser.name.charAt(0).toUpperCase() : 'U');
            
            profileContent.innerHTML = `
                <div class="profile-avatar-large">${avatarHtml}</div>
                <div class="profile-name">${currentUser.name || 'Пользователь'}</div>
                <div style="background: #fff2d9; padding: 15px; border-radius: 10px; margin: 20px 0;">
                    <p><strong>Вход через:</strong> ВКонтакте</p>
                    <p><strong>Дата входа:</strong> ${new Date(currentUser.authDate).toLocaleString()}</p>
                </div>
                <button class="profile-logout-btn" onclick="showLogoutConfirm()">🚪 Выйти</button>
            `;
            
            document.getElementById('profileModal').classList.add('active');
        }

        function hideProfileModal() {
            document.getElementById('profileModal').classList.remove('active');
        }

        function showLogoutConfirm() {
            document.getElementById('logoutConfirmModal').classList.add('active');
        }

        function hideLogoutConfirm() {
            document.getElementById('logoutConfirmModal').classList.remove('active');
        }

        function confirmLogout() {
            hideLogoutConfirm();
            hideProfileModal();
            
            currentUser = null;
            localStorage.removeItem('currentUser');
            orders = [];
            updateAuthUI();
            showNotification('Вы вышли из аккаунта');
        }

        // Отображение товаров
        function displayProducts() {
            const currentProducts = products.length > 0 ? products : fallbackProducts;
            
            const filtered = currentProducts.filter(p => 
                (currentCategory === 'all' || p.category === currentCategory) && 
                p.name.toLowerCase().includes(searchQuery.toLowerCase())
            );
            
            const desktopHtml = filtered.map(p => {
                const cartItem = cart.find(item => item.id === p.id);
                const qty = cartItem ? formatQuantity(cartItem.count * p.step) : '0';
                return `
                    <div class="product-item ${cartItem ? 'in-cart' : ''}">
                        <div class="product-info">
                            <div class="product-name">${p.name}</div>
                            <div class="product-note">${p.orderNote}</div>
                        </div>
                        <span class="product-price">${p.price} ₽</span>
                        <span class="product-unit">${p.unit}</span>
                        <div class="product-controls">
                            <button class="product-qty-btn" onclick="updateProductQuantity(${p.id}, -${p.step})">−</button>
                            <span class="product-qty-value" id="qty-${p.id}">${qty}</span>
                            <button class="product-qty-btn" onclick="updateProductQuantity(${p.id}, ${p.step})">+</button>
                        </div>
                    </div>
                `;
            }).join('');
            
            document.getElementById('productsList').innerHTML = desktopHtml;
            document.getElementById('mobileProductsList').innerHTML = desktopHtml; // упрощенно
        }

        // Обновление количества товара
        function updateProductQuantity(productId, delta) {
            const currentProducts = products.length > 0 ? products : fallbackProducts;
            const product = currentProducts.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);
            
            if (existingItem) {
                const deltaCount = delta > 0 ? 1 : -1;
                const newCount = existingItem.count + deltaCount;
                if (newCount <= 0) {
                    cart = cart.filter(item => item.id !== productId);
                } else {
                    existingItem.count = newCount;
                }
            } else if (delta > 0) {
                cart.push({ ...product, count: 1 });
            }
            
            saveCart();
            displayProducts();
            updateAllCarts();
        }

        function searchProducts() {
            searchQuery = document.getElementById('searchInput').value;
            displayProducts();
        }

        function filterProducts(category) {
            currentCategory = category;
            document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            displayProducts();
        }

        function updateAllCarts() {
            const totalUnits = cart.reduce((sum, item) => sum + item.count, 0);
            document.getElementById('cartCount').textContent = totalUnits > 99 ? '99+' : totalUnits;
            
            let totalSum = 0;
            const itemsHtml = cart.map(item => {
                const quantity = item.count * item.step;
                const itemTotal = item.price * quantity;
                totalSum += itemTotal;
                return `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-note">${item.orderNote}</div>
                        </div>
                        <div class="cart-item-controls">
                            <button class="cart-item-btn" onclick="updateProductQuantity(${item.id}, -${item.step})">−</button>
                            <span class="cart-item-quantity">${formatQuantity(quantity)}</span>
                            <button class="cart-item-btn" onclick="updateProductQuantity(${item.id}, ${item.step})">+</button>
                            <button class="cart-item-remove" onclick="removeFromCart(${item.id})">×</button>
                        </div>
                    </div>
                `;
            }).join('');
            
            document.getElementById('desktopCartItems').innerHTML = itemsHtml || '<p style="color: #b87333; text-align: center;">Корзина пуста</p>';
            document.getElementById('desktopCartTotal').querySelector('span').textContent = `${totalSum.toFixed(2)} ₽`;
            document.getElementById('mobileCartTotal').querySelector('span').textContent = `${totalSum.toFixed(2)} ₽`;
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            saveCart();
            displayProducts();
            updateAllCarts();
        }

        function saveCart() {
            localStorage.setItem('cart', JSON.stringify(cart));
        }

        function loadCart() {
            const saved = localStorage.getItem('cart');
            if (saved) {
                try {
                    cart = JSON.parse(saved);
                } catch (e) {
                    cart = [];
                }
            }
        }

        function clearCart() {
            if (cart.length === 0) return;
            if (confirm('Очистить корзину?')) {
                cart = [];
                saveCart();
                displayProducts();
                updateAllCarts();
                showNotification('Корзина очищена');
            }
        }

        function updateWidgetCalc() {
            const price = parseFloat(document.getElementById('widgetPriceKg').value) || 0;
            const gram = parseFloat(document.getElementById('widgetGram').value) || 0;
            document.getElementById('widgetResult').textContent = `Стоимость: ${((gram/1000)*price).toFixed(2)} ₽`;
        }

        function updateMobileCalc() {
            const price = parseFloat(document.getElementById('mobilePriceKg').value) || 0;
            const gram = parseFloat(document.getElementById('mobileGram').value) || 0;
            document.getElementById('mobileCalcResult').textContent = `Стоимость: ${((gram/1000)*price).toFixed(2)} ₽`;
        }

        function toggleMobileMenu() {
            document.getElementById('mobileMenu').classList.toggle('active');
            document.getElementById('menuOverlay').classList.toggle('active');
        }

        function toggleMobileCalculator() {
            document.getElementById('mobileCalculator').classList.toggle('active');
        }

        function toggleMobileCart() {
            document.getElementById('mobileCartModal').classList.add('active');
        }

        function hideMobileCart() {
            document.getElementById('mobileCartModal').classList.remove('active');
        }

        function showModal(type) {
            document.getElementById(type + 'Modal').classList.add('active');
        }

        function hideModal(type) {
            document.getElementById(type + 'Modal').classList.remove('active');
        }

        function handlePhoneInput(input) {
            let value = input.value;
            if (!value.startsWith('+7')) {
                input.value = '+7';
                return;
            }
            let numbers = value.substring(2).replace(/[^0-9]/g, '');
            if (numbers.length > 10) numbers = numbers.substring(0, 10);
            input.value = '+7' + numbers;
        }

        function showAuthModal() {
            document.getElementById('authModal').classList.add('active');
        }

        function hideAuthModal() {
            document.getElementById('authModal').classList.remove('active');
        }

        function handleMobileAuth() {
            if (currentUser) {
                showProfile();
            } else {
                showAuthModal();
            }
        }

        async function showOrders() {
            if (!currentUser) {
                showNotification('Сначала войдите');
                showAuthModal();
                return;
            }
            await loadUserOrdersFromFirebase();
            displayOrders();
            document.getElementById('ordersModal').classList.add('active');
        }

        function hideOrders() {
            document.getElementById('ordersModal').classList.remove('active');
        }

        function displayOrders() {
            const container = document.getElementById('ordersContainer');
            if (orders.length === 0) {
                container.innerHTML = '<div class="no-orders">📭 Нет заказов</div>';
                return;
            }
            container.innerHTML = orders.map(order => {
                const total = order.items.reduce((sum, item) => sum + (item.price * item.count * item.step), 0);
                return `
                <div class="order-card">
                    <div class="order-header">
                        <span class="order-id">Заказ #${order.id.toString().slice(-6)}</span>
                        <span class="order-date">${order.date}</span>
                    </div>
                    <div class="order-body">
                        <p><strong>📦 Подпись:</strong> ${order.packageName}</p>
                        <p><strong>👤 Имя:</strong> ${order.customerName}</p>
                        <p><strong>📞 Телефон:</strong> ${order.phone}</p>
                        <p><strong>📍 Точка:</strong> ${order.pickupPoint}</p>
                        <p><strong>💰 Сумма:</strong> ${total.toFixed(2)} ₽</p>
                    </div>
                </div>`;
            }).join('');
        }

        function showOrderForm() {
            if (!currentUser) {
                showNotification('Сначала войдите');
                showAuthModal();
                return;
            }
            if (cart.length === 0) {
                showNotification('Корзина пуста');
                return;
            }
            document.getElementById('orderForm').classList.add('active');
        }

        function hideOrderForm() {
            document.getElementById('orderForm').classList.remove('active');
        }

        async function submitOrder(event) {
            event.preventDefault();
            
            const packageName = document.getElementById('packageName').value;
            const pickupPoint = document.getElementById('pickupPoint').value;
            const customerName = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            
            const orderId = Date.now();
            
            const vkMessage = `
🛍 НОВЫЙ ЗАКАЗ #${orderId.toString().slice(-6)}
👤 Пользователь: ${currentUser.name}

📦 Подпись: ${packageName}
👤 Имя: ${customerName}
📞 Телефон: ${phone}
📍 Точка: ${pickupPoint}

🛒 Состав:
${cart.map(item => `• ${item.name} — ${item.count * item.step} ${item.orderUnit}`).join('\n')}

💰 Сумма: ${cart.reduce((sum, item) => sum + (item.price * item.count * item.step), 0).toFixed(2)} ₽
            `;
            
            await sendVKMessage(vkMessage);
            
            showNotification('Заказ принят! 🙏');
            cart = [];
            saveCart();
            displayProducts();
            updateAllCarts();
            hideOrderForm();
            event.target.reset();
        }

        function showNotification(message) {
            const n = document.getElementById('notification');
            n.textContent = message;
            n.classList.add('show');
            setTimeout(() => n.classList.remove('show'), 3000);
        }

        window.onclick = (event) => {
            if (event.target.classList.contains('modal')) {
                event.target.classList.remove('active');
            }
        };
    </script>
</body>
</html>
